          padding: 0 16px;
          position: relative;
        }
        .buttons { display: flex; gap: 8px; }
        .btn {
          width: 12px; height: 12px;
          border-radius: 50%;
          display: inline-block;
        }
        .close { background: #ff5f57; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #28c840; }
        .title {
