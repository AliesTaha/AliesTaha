<svg fill="none" viewBox="0 0 800 640" width="800" height="640" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .card {
          width: 100%;
          padding: 44px 60px;
          font-family: Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
          background: #FDFAF7;
          border: 1px solid #E8D5C0;
          border-radius: 10px;
        }
        .section { margin-bottom: 32px; }
        .section:last-child { margin-bottom: 0; }
        .label {
          font-size: 11px;
          letter-spacing: 3.5px;
          text-transform: uppercase;
          color: #A0845C;
          margin-bottom: 10px;
        }
        .items {
          font-size: 14.5px;
          line-height: 1.9;
          color: #3C2415;
          letter-spacing: 0.2px;
        }
        .s { color: #C9956B; margin: 0 3px; }
        @media (prefers-color-scheme: dark) {
          .card {
            background: #1C1410;
            border-color: #3A2A1E;
          }
          .label { color: #A0845C; }
          .items { color: #D4C4B0; }
          .s { color: #6B5540; }
        }
      </style>
      <div class="card">
        <div class="section">
          <div class="label">craft</div>
          <div class="items">
            write more <span class="s">·</span> do great work <span class="s">·</span> learn to code <span class="s">·</span> take something seriously<br/>
            let it consume you <span class="s">·</span> iterate violently <span class="s">·</span> execute <span class="s">·</span> act fast
          </div>
        </div>
        <div class="section">
          <div class="label">mind</div>
          <div class="items">
            read essays <span class="s">·</span> read old books <span class="s">·</span> read ancient scripts <span class="s">·</span> read poetry<br/>
            journal <span class="s">·</span> sit alone <span class="s">·</span> follow your intuition <span class="s">·</span> plan for 15 minutes
          </div>
        </div>
        <div class="section">
          <div class="label">presence</div>
          <div class="items">
            act sincere <span class="s">·</span> refine your speech <span class="s">·</span> stay composed <span class="s">·</span> learn persuasion<br/>
            craft reputation <span class="s">·</span> talk to strangers <span class="s">·</span> help people
          </div>
        </div>
        <div class="section">
          <div class="label">rhythm</div>
          <div class="items">
            optimise for efficiency <span class="s">·</span> systemise your day <span class="s">·</span> have a calendar <span class="s">·</span> value your time<br/>
            maintain a todo list <span class="s">·</span> organise your desk <span class="s">·</span> discard the useless
          </div>
        </div>
        <div class="section">
          <div class="label">life</div>
          <div class="items">
            experience life <span class="s">·</span> experience art <span class="s">·</span> visit bookstores <span class="s">·</span> eat clean<br/>
            play combat sports <span class="s">·</span> leave your phone at home <span class="s">·</span> visualise it<br/>
            notice patterns <span class="s">·</span> invite what aligns <span class="s">·</span> rejections aren't permanent
          </div>
        </div>
