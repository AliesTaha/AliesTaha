            <div class="items">
              write more <span class="d">·</span> do great work <span class="d">·</span> learn to code <span class="d">·</span> take something seriously<br/>
              let it consume you <span class="d">·</span> iterate violently <span class="d">·</span> execute <span class="d">·</span> act fast
            </div>
          </div>
          <div class="section">
