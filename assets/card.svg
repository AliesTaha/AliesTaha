            </div>
          </div>
          <div class="section">
            <div class="label">life</div>
            <div class="items">
              experience life <span class="d">·</span> experience art <span class="d">·</span> visit bookstores <span class="d">·</span> eat clean<br/>
              play combat sports <span class="d">·</span> leave your phone at home <span class="d">·</span> visualise it<br/>
              notice patterns <span class="d">·</span> invite what aligns <span class="d">·</span> rejections aren't permanent
