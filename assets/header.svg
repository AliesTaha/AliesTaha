<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .banner {
          position: relative;
          width: 100%;
          height: 200px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          border-radius: 12px;
          background: #f5f1e8;
          border: 1px solid rgba(0,0,0,0.1);
          overflow: hidden;
        }
        .gradient {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background:
            radial-gradient(ellipse at 20% 50%, rgba(210, 200, 180, 0.3), transparent 60%),
            radial-gradient(ellipse at 80% 80%, rgba(230, 220, 200, 0.2), transparent 50%);
        }
        .content {
          position: relative;
          z-index: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .name {
          font-size: 48px;
          color: #1a1a1a;
          letter-spacing: 6px;
          font-weight: 300;
        }
        .rule {
          width: 140px;
          height: 1px;
          background: rgba(0,0,0,0.12);
          margin: 16px 0;
        }
        .tagline {
          font-size: 13px;
          color: #888;
          letter-spacing: 4px;
          font-weight: 400;
        }
        @media (prefers-color-scheme: dark) {
          .banner {
            background: #1e1c18;
            border-color: rgba(255,255,255,0.08);
          }
          .gradient {
            background:
              radial-gradient(ellipse at 20% 50%, rgba(60, 55, 45, 0.4), transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(50, 45, 35, 0.3), transparent 50%);
          }
          .name { color: #e8e4df; }
          .rule { background: rgba(255,255,255,0.1); }
          .tagline { color: #777; }
        }
      </style>
      <div class="banner">
        <div class="gradient"></div>
        <div class="content">
          <div class="name">ali taha</div>
          <div class="rule"></div>
          <div class="tagline">write · build · think</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
